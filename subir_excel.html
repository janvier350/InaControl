<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InaControl - Cargar Reporte de Asistencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .upload-area {
            border: 2px dashed #007bff;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #e9ecef;
            border-color: #0056b3;
        }
        .upload-area.dragover {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        .estado-bueno { background-color: #d4edda; }
        .estado-regular { background-color: #fff3cd; }
        .estado-problema { background-color: #f8d7da; }
        .estado-critico { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">đź“Š Cargar Reporte de Asistencia</h1>
        
        <!-- Formulario de subida -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Subir Archivo Excel</h5>
            </div>
            <div class="card-body">
                <form id="formUpload" enctype="multipart/form-data">
                    <div class="upload-area" id="uploadArea">
                        <i class="fas fa-cloud-upload-alt fa-3x mb-3"></i>
                        <h5>Arrastra tu archivo Excel aquĂ­</h5>
                        <p class="text-muted">o haz clic para seleccionar</p>
                        <input type="file" id="fileInput" name="excel_file" accept=".xls,.xlsx" hidden>
                        <button type="button" class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                            Seleccionar Archivo
                        </button>
                    </div>
                    <div id="fileInfo" class="mt-3" style="display: none;"></div>
                    <button type="submit" class="btn btn-success mt-3" id="btnProcesar" style="display: none;">
                        <i class="fas fa-cog"></i> Procesar Archivo
                    </button>
                </form>
            </div>
        </div>

        <!-- Resultados -->
        <div id="resultados" style="display: none;">
            <!-- AquĂ­ se cargarĂˇn los resultados dinĂˇmicamente -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
    // Manejo de drag & drop
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const btnProcesar = document.getElementById('btnProcesar');
    const formUpload = document.getElementById('formUpload');

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            handleFileSelection(files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFileSelection(e.target.files[0]);
        }
    });

    function handleFileSelection(file) {
        if (!file.name.match(/\.(xls|xlsx)$/)) {
            alert('Por favor, selecciona un archivo Excel vĂˇlido (.xls o .xlsx)');
            return;
        }

        fileInfo.innerHTML = `
            <div class="alert alert-info">
                <i class="fas fa-file-excel"></i>
                <strong>Archivo seleccionado:</strong> ${file.name} 
                (${(file.size / 1024 / 1024).toFixed(2)} MB)
            </div>
        `;
        fileInfo.style.display = 'block';
        btnProcesar.style.display = 'block';
    }

    formUpload.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    console.log("Iniciando envío del formulario...");
    
    const formData = new FormData();
    formData.append('excel_file', fileInput.files[0]);

    btnProcesar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
    btnProcesar.disabled = true;

    try {
        console.log("Enviando request a procesar_excel_simple.php...");
        
        const response = await fetch('procesar_excel_simple.php', {
            method: 'POST',
            body: formData
        });
        
        console.log("Respuesta recibida, status:", response.status);
        
        const text = await response.text();
        console.log("Respuesta cruda completa:", text);
        
        // Verificar si es JSON válido
        if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
            const result = JSON.parse(text);
            mostrarResultados(result);
        } else {
            console.error("No es JSON válido, mostrando error completo:");
            alert('Error del servidor. Respuesta: ' + text.substring(0, 200));
        }

    } catch (error) {
        console.error('Error completo:', error);
        alert('Error: ' + error.message);
    } finally {
        btnProcesar.innerHTML = '<i class="fas fa-cog"></i> Procesar Archivo';
        btnProcesar.disabled = false;
    }
});
    
    // REEMPLAZAR en tu <script> de index.html:

function mostrarResultados(data) {
    if (data.error) {
        alert('Error: ' + data.error);
        return;
    }

    if (data.success && data.data && data.data.detalle_asistencia) {
        const resultadosDiv = document.getElementById('resultados');
        resultadosDiv.style.display = 'block';
        // Llamar a la función simple de renderizado para nuestra tabla
        resultadosDiv.innerHTML = generarHTMLAsistencia(data.data.detalle_asistencia);
    } else {
        alert('Error del servidor: ' + (data.mensaje || data.error || 'Respuesta inesperada.'));
    }
}

function generarHTMLAsistencia(detalle_asistencia) {
    let html = `
        <div class="card mt-4">
            <div class="card-header bg-success text-white">
                <h5><i class="fas fa-table"></i> Detalle de Asistencia por Día</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-bordered table-sm">
                        <thead class="thead-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Fecha</th>
                                <th>Entrada 1</th>
                                <th>Salida 1</th>
                                <th>Entrada 2</th>
                                <th>Salida 2</th>
                                <th>Total Horas</th>
                            </tr>
                        </thead>
                        <tbody>
    `;

    detalle_asistencia.forEach(fila => {
        let totalHoras = fila.total_horas;
        let rowClass = '';
        
        // Aplica el estilo de las clases que ya tienes en tu CSS
        if (totalHoras.includes('ERROR') || totalHoras === 'INCOMPLETO' || totalHoras === 'FALTA') {
            rowClass = 'estado-problema'; // Usamos la clase de problema para destacar
        } else if (totalHoras === '00:00') {
             rowClass = 'estado-regular'; // Para ceros (días libres)
        }

        html += `
            <tr class="${rowClass}">
                <td>${fila.nombre}</td>
                <td>${fila.fecha}</td>
                <td>${fila.entrada_1}</td>
                <td>${fila.salida_1}</td>
                <td>${fila.entrada_2}</td>
                <td>${fila.salida_2}</td>
                <td><strong>${totalHoras}</strong></td>
            </tr>
        `;
    });

    html += `
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    `;

    return html;
}

// Eliminar o comentar la función original 'generarHTMLResultados' si existe para evitar conflictos.
</script>
</body>
</html>
